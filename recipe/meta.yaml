{% set name = "rpthermo" %}
{% set version = "6.8.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/brsynth/rpThermo/archive/refs/tags/{{ version }}.tar.gz
  sha256: 60ef37e39784a98356e5f9f644ed69040dc595d748d43ee973a3d38a3568efa5

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} setup.py install

requirements:
  host:
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - equilibrator-api
    - brs_utils >=1.26.0
    - chemlite
    - rplibs >=6.9.3

test:
  requires:
    - python {{ python_min }}
  imports:
    - rpthermo
  commands:
    - python -m rpthermo --help

about:
  home: https://github.com/brsynth/rpThermo/tree/main
  summary: "Calculate the formation energy of chemical species and the Gibbs free energy for each reaction and for the heterologous pathway itself"
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ramez17khaled
    - breakthewall
    - tduigou
